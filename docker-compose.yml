services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Neo4j Browser (visual UI at http://localhost:7474)
      - "7687:7687"   # Bolt protocol (what the Python driver connects to)
    environment:
      NEO4J_AUTH: neo4j/bimgraph123
      NEO4J_PLUGINS: '["apoc"]'        # APOC = utility functions (useful later)
      NEO4J_dbms_memory_heap_max__size: 512m   # keep memory low on M1
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports: ["8000:8000"]
    depends_on: [redis, neo4j]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_HOST=redis
      - NEO4J_URI=bolt://neo4j:7687
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    depends_on: [api]
    restart: unless-stopped

volumes:
  neo4j_data:
